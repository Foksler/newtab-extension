<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div id="background"></div>
  <div id="clock"></div>
  <div id="groups-grid"></div>

  <button id="settings-toggle" title="Settings">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
      <path d="M10 13a3 3 0 100-6 3 3 0 000 6z"/>
      <path fill-rule="evenodd" d="M9.99 0C9.47 0 8.96.07 8.48.2L7.83 2.15a7.5 7.5 0 00-1.78 1.03L4.15 2.6l-1.3 2.26 1.5 1.32a7.6 7.6 0 000 2.04l-1.5 1.32 1.3 2.26 1.9-.58a7.5 7.5 0 001.78 1.03l.65 1.95a7.5 7.5 0 003.04 0l.65-1.95a7.5 7.5 0 001.78-1.03l1.9.58 1.3-2.26-1.5-1.32a7.6 7.6 0 000-2.04l1.5-1.32-1.3-2.26-1.9.58a7.5 7.5 0 00-1.78-1.03L12.52.2A7.5 7.5 0 009.99 0zM10 7a3 3 0 100 6 3 3 0 000-6z"/>
    </svg>
  </button>

  <aside id="settings-panel">
    <div class="settings-header">
      <h2>Settings</h2>
      <div class="settings-header-actions">
        <button id="settings-expand" title="Expand">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1h4v1.5h-2.44l3.47 3.47-1.06 1.06L2 3.56V6H.5V1.5A.5.5 0 011.5 1zm13 0a.5.5 0 01.5.5V6h-1.5V3.56L10.03 7.03 8.97 5.97 12.44 2.5H10V1h4.5zM5.97 10.03l-3.47 3.47H5V15H.5a.5.5 0 01-.5-.5V10h1.5v2.44l3.47-3.47 1.06 1.06zm4.06 0l1.06-1.06 3.41 3.47V10H16v4.5a.5.5 0 01-.5.5H11v-1.5h2.44l-3.41-3.47z"/></svg>
        </button>
        <button id="settings-close" title="Close">&times;</button>
      </div>
    </div>
    <div id="settings-content"></div>
  </aside>
  <div id="settings-overlay"></div>

  <script src="storage.js"></script>
  <script src="settings.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
